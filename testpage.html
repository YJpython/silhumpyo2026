<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>testpage</title>
    </head>
    <body>
        <h1>랜덤 숫자 뽑기</h1>
        <p id="result">여기에 숫자가 나옵니다</p>
        <button onclick="drawNumber()">뽑기</button>

        <script>
            function drawNumber(){
            let randomNum = Math.floor(Math.random() * 100) + 1;
            document.getElementById("result").innerText = randomNum;
        }
        </script>
    </body>
</html>
